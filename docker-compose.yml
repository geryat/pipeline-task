services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${IMAGE_TAG:-dev}
    image: pipeline-task:${IMAGE_TAG:-latest}
    container_name: pipeline-task
    ports:
      - "${APP_PORT:-8080}:5000"
    restart: unless-stopped
    environment:
      - APP_VERSION=${IMAGE_TAG:-latest}
