name: Build and Push to GHCR and Docker Hub

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image with Docker Compose
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: docker compose build app

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # docker tag and docker push have no docker compose equivalent
      # for multi-registry pushing — these two commands are unavoidable
      - name: Tag and push to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker tag pipeline-task:$VERSION ghcr.io/${{ github.repository }}:$VERSION
          docker tag pipeline-task:$VERSION ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:$VERSION
          docker push ghcr.io/${{ github.repository }}:latest

      - name: Tag and push to Docker Hub
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker tag pipeline-task:$VERSION ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION
          docker tag pipeline-task:$VERSION ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest

      - name: Pull and verify image from Docker Hub
        env:
          VERSION: ${{ steps.version.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          echo "Pulling image from Docker Hub..."
          docker compose -f docker-compose.yml -f docker-compose.remote.yml pull

          echo "Running container..."
          docker compose -f docker-compose.yml -f docker-compose.remote.yml up -d

          echo "Waiting for container to be ready..."
          sleep 5

          echo "=== docker compose ps ==="
          docker compose -f docker-compose.yml -f docker-compose.remote.yml ps -a

          echo "=== docker compose logs ==="
          docker compose -f docker-compose.yml -f docker-compose.remote.yml logs

          echo "Hitting health endpoint..."
          curl --fail http://localhost:8080/health

          echo "Smoke test passed, cleaning up..."
          docker compose -f docker-compose.yml -f docker-compose.remote.yml down
