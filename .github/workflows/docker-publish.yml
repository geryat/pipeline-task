name: Build and Push to GHCR and Docker Hub

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push to GHCR and Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Docker Images
            - GHCR: `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            - Docker Hub: `${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ steps.version.outputs.version }}`

            ## Pull & Run
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ steps.version.outputs.version }}
            docker run -d -p 8080:5000 ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ steps.version.outputs.version }}
            ```

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest image
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml pull

      - name: Restart container
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml up -d --force-recreate

      - name: Verify
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml ps
