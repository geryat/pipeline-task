name: Build, Push, Release & Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:  # allow manual trigger from GitHub UI

permissions:
  contents: write
  packages: write

env:
  IMAGE_NAME: ${{ github.event.repository.name }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---- Determine version ----
      #   Tag push (v0.1.0)  →  version = 0.1.0
      #   Push to main       →  version = <VERSION>-<short-sha>  (immutable, unique per commit)
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VER="${GITHUB_REF#refs/tags/v}"
          else
            VER_FILE="$(cat VERSION | tr -d '[:space:]')"
            VER="${VER_FILE}-${GITHUB_SHA::7}"
          fi
          echo "version=${VER}" >> "$GITHUB_OUTPUT"
          echo "Publishing: ${VER}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ---- Registry logins ----
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ---- Build once, push to BOTH registries ----
      # Tags pushed:
      #   <version>-<sha>  → immutable, unique per commit (safe for pinning)
      #   <version>        → movable semver (only on tag push)
      #   latest           → movable pointer to newest build
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            APP_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ---- Smoke test the built image ----
      - name: Smoke test
        run: |
          docker run --rm -d -p 5000:5000 --name smoke-test \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          sleep 3
          curl -fsS http://localhost:5000/health || { docker logs smoke-test; exit 1; }
          echo "→ Version endpoint:"
          curl -fsS http://localhost:5000/version
          docker stop smoke-test

      # ---- GitHub Release (only on tag push) ----
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## 🐳 Docker Images
            - **GHCR**: `ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}`
            - **Docker Hub**: `${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}`

            ## 🚀 Pull & Run
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            docker run -d -p 8080:5000 ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
            ```

  # ---- Deploy to self-hosted runner (only on tag push) ----
  deploy:
    runs-on: self-hosted
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Pull latest image
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml pull

      - name: Restart container
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.version }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml up -d --force-recreate

      - name: Verify deployment
        run: |
          sleep 3
          docker compose -f docker-compose.yml -f docker-compose.remote.yml ps
          curl -fsS http://localhost:8080/health
          curl -fsS http://localhost:8080/version
