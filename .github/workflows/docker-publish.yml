name: Build and Push to GHCR and Docker Hub

on:
  push:
    branches: [ "main" ]
    tags: [ "v*.*.*" ]

permissions:
  contents: write
  packages: write

jobs:
  # ── 1. detect changes ──────────────────────────────────────────────────────
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed files
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            app:
              - '**/*.py'
              - '**/requirements*.txt'
              - '**/Dockerfile'
              - '**/docker-compose*.yml'

  # ── 2. lint ────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint dependencies
        run: pip install -r requirements-dev.txt

      - name: Run flake8
        run: flake8 app/app.py testapp.py --max-line-length=88 --exclude=__pycache__,.venv,venv,node_modules,.git,actions-runner

  # ── 3. unit test ───────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest testapp.py -v

  # ── 4. build + trivy + push ────────────────────────────────────────────────
  build-and-push:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image locally for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: pipeline-task:scan
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy security scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: pipeline-task:scan
          format: table
          exit-code: 1
          severity: CRITICAL
          ignore-unfixed: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to GHCR and Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ steps.version.outputs.version }}
            ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 5. deploy + health check + rollback ───────────────────────────────────
  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Save current version for rollback
        id: current
        run: |
          CURRENT=$(docker inspect pipeline-task --format='{{.Config.Image}}' 2>/dev/null || true)
          if [ -z "$CURRENT" ]; then
            echo "image=none" >> "$GITHUB_OUTPUT"
            echo "Current running image: none"
          else
            echo "image=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Current running image: $CURRENT"
          fi

      - name: Pull latest image
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          VERSION: latest
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml pull

      - name: Restart container
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          VERSION: latest
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml up -d --force-recreate

      - name: Health check
        id: healthcheck
        run: |
          echo "Waiting for container to be ready..."
          sleep 5
          curl --fail http://localhost:8080/health
          echo "Health check passed"

      - name: Rollback on failure
        if: failure() && steps.current.outputs.image != 'none'
        run: |
          echo "Health check failed — rolling back to ${{ steps.current.outputs.image }}..."
          docker stop pipeline-task || true
          docker rm pipeline-task || true
          docker run -d \
            --name pipeline-task \
            -p 8080:5000 \
            --restart unless-stopped \
            ${{ steps.current.outputs.image }}
          echo "Rollback complete"

      - name: Show container status
        if: success()
        run: docker compose -f docker-compose.yml -f docker-compose.remote.yml ps

  # ── 6. release (only on version tags) ─────────────────────────────────────
  release:
    runs-on: ubuntu-latest
    needs: [build-and-push, deploy]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          name: Release ${{ needs.build-and-push.outputs.version }}
          body: |
            ## Docker Images
            - GHCR: `ghcr.io/${{ github.repository }}:${{ needs.build-and-push.outputs.version }}`
            - Docker Hub: `${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ needs.build-and-push.outputs.version }}`

            ## Pull & Run
            ```bash
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ needs.build-and-push.outputs.version }}
            docker run -d -p 8080:5000 ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:${{ needs.build-and-push.outputs.version }}
            ```
