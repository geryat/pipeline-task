name: Build and Push to GHCR and Docker Hub

on:
  push:
    tags: [ "v*.*.*" ]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image with Docker Compose
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: docker compose build app

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag and push to GHCR
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker tag pipeline-task:$VERSION ghcr.io/${{ github.repository }}:$VERSION
          docker push ghcr.io/${{ github.repository }}:$VERSION
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag pipeline-task:$VERSION ghcr.io/${{ github.repository }}:latest
            docker push ghcr.io/${{ github.repository }}:latest
          fi

      - name: Tag and push to Docker Hub
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          docker tag pipeline-task:$VERSION ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag pipeline-task:$VERSION ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:latest
          fi

      - name: Pull and verify image from Docker Hub
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          echo "Pulling image from Docker Hub..."
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION

          echo "Running container..."
          docker run -d --name smoke-test -p 5000:5000 ${{ secrets.DOCKERHUB_USERNAME }}/pipeline-task:$VERSION

          echo "Waiting for container to be ready..."
          sleep 5

          echo "Hitting health endpoint..."
          curl --fail http://localhost:5000/health

          echo "Smoke test passed, cleaning up..."
          docker stop smoke-test
          docker rm smoke-test
